spring.application.name=pasarela
server.port=8090

# ===== URLs de los microservicios =====
microservicio.usuarios.url=http://localhost:8080/api/
microservicio.productos.url=http://localhost:8081/
microservicio.compraventas.url=http://localhost:8082/

# ===== Enrutamiento Zuul =====
zuul.ignored-patterns=/auth/**

zuul.routes.usuarios.path=/api/usuarios/**
zuul.routes.usuarios.url=http://localhost:8080/api/usuarios/

zuul.routes.productos.path=/productos/**
zuul.routes.productos.url=http://localhost:8081/productos/

zuul.routes.compraventas.path=/compraventas/**
zuul.routes.compraventas.url=http://localhost:8082/compraventas/

