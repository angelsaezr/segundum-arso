spring.application.name=pasarela
server.port=${SERVER_PORT:8090}

# URLs de microservicios (para Retrofit)
microservicio.usuarios.url=${MICROSERVICIO_USUARIOS_URL:http://localhost:8080/api/}
microservicio.productos.url=${MICROSERVICIO_PRODUCTOS_URL:http://localhost:8081/}
microservicio.compraventas.url=${MICROSERVICIO_COMPRAVENTAS_URL:http://localhost:8082/}

# Enrutamiento Zuul
zuul.sensitiveHeaders=
zuul.ignored-patterns=/auth/**

zuul.routes.usuarios.path=/api/usuarios/**
zuul.routes.usuarios.url=${ZUUL_ROUTES_USUARIOS_URL:http://localhost:8080/api/usuarios/}

zuul.routes.productos.path=/productos/**
zuul.routes.productos.url=${ZUUL_ROUTES_PRODUCTOS_URL:http://localhost:8081/productos/}

zuul.routes.compraventas.path=/compraventas/**
zuul.routes.compraventas.url=${ZUUL_ROUTES_COMPRAVENTAS_URL:http://localhost:8082/compraventas/}

