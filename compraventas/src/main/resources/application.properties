spring.application.name=compraventas
server.port=${SERVER_PORT:8082}

# MongoDB
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/compraventas}

# RabbitMQ
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:practicas}

# URLs de otros microservicios
microservicio.productos.url=${MICROSERVICIO_PRODUCTOS_URL:http://localhost:8081/}
microservicio.usuarios.url=${MICROSERVICIO_USUARIOS_URL:http://localhost:8080/api/}